<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NanoVoid QR</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{

height:100vh;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

background:url('https://files.catbox.moe/c8vuif.jpg');
background-size:cover;
background-position:center;

}

.overlay{

position:absolute;
width:100%;
height:100%;

background:rgba(0,0,0,.72);
backdrop-filter:blur(5px);

}

.particles{

position:absolute;
width:100%;
height:100%;
overflow:hidden;

}

.particles span{

position:absolute;
display:block;

width:8px;
height:8px;

background:#ff004c;
border-radius:50%;

animation:animate 10s linear infinite;
bottom:-100px;

}

@keyframes animate{

0%{
transform:translateY(0) scale(0);
opacity:0;
}

50%{
opacity:1;
}

100%{
transform:translateY(-1000px) scale(1.5);
opacity:0;
}

}

.container{

position:relative;
z-index:2;

width:350px;

padding:30px;

border-radius:30px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(10px);

border:1px solid rgba(255,255,255,.15);

text-align:center;

box-shadow:0 0 40px rgba(255,0,80,.5);

animation:fade 1.2s ease;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.logo{

font-size:38px;
font-weight:bold;

color:white;

text-shadow:0 0 20px #ff0055;

margin-bottom:10px;

}

.desc{

color:#ddd;
font-size:14px;

margin-bottom:25px;

}

button{

width:100%;

padding:15px;

border:none;
border-radius:18px;

background:linear-gradient(45deg,#ff004c,#ff3366);

color:white;

font-size:17px;
font-weight:bold;

cursor:pointer;

transition:.3s;

box-shadow:0 0 30px #ff0055;

margin-top:10px;

}

button:hover{

transform:scale(1.05);

}

#result{

margin-top:25px;

}

img{

width:260px;

border-radius:20px;

box-shadow:0 0 35px #ff0055;

animation:float 2s infinite ease-in-out;

}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-10px);
}

100%{
transform:translateY(0px);
}

}

.links{

margin-top:25px;

display:flex;
flex-direction:column;
gap:12px;

}

.links a{

text-decoration:none;

padding:12px;

border-radius:15px;

background:rgba(255,255,255,.08);

color:white;

transition:.3s;

border:1px solid rgba(255,255,255,.1);

}

.links a:hover{

background:#ff0055;

transform:scale(1.03);

}

.footer{

margin-top:20px;

font-size:12px;
color:#aaa;

}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="particles">

<span style="left:10%;animation-delay:0s;"></span>
<span style="left:20%;animation-delay:2s;"></span>
<span style="left:35%;animation-delay:4s;"></span>
<span style="left:50%;animation-delay:1s;"></span>
<span style="left:65%;animation-delay:3s;"></span>
<span style="left:80%;animation-delay:5s;"></span>

</div>

<div class="container">

<div class="logo">
🩸 NanoVoid QR
</div>

<div class="desc">
Sistema oficial de vinculación WhatsApp MultiDevice 🥀
</div>

<button onclick="generarQR()">
<i class="fa-solid fa-qrcode"></i>
GENERAR QR
</button>

<div id="result"></div>

<div class="links">

<a href="https://wa.me/50231882808" target="_blank">

<i class="fa-brands fa-whatsapp"></i>
CONTACTAR AL CREADOR

</a>

<a href="https://chat.whatsapp.com/I6PxvgOVnNM104BJvws5ZB" target="_blank">

<i class="fa-solid fa-users"></i>
GRUPO OFICIAL

</a>

</div>

<div class="footer">
Powered by NanoVoid 🥀
</div>

</div>

<script>

async function generarQR(){

const result =
document.getElementById('result')

result.innerHTML =
'<p style="color:white;">⏳ Generando QR...</p>'

await fetch('/generate')

checkQR()

}

async function checkQR(){

const res =
await fetch('/qr')

const data =
await res.json()

const result =
document.getElementById('result')

if(!data.status){

setTimeout(checkQR,2000)

return

}

result.innerHTML = `
<img src="${data.qr}">
`

}

</script>

</body>
</html>
